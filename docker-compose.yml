services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backlog}
      POSTGRES_USER: ${POSTGRES_USER:-backlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backlog}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backlog} -d ${POSTGRES_DB:-backlog}"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10

  minio-createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      (mc mb --ignore-existing local/${STORAGE_S3_BUCKET:-backlog-dev}) &&
      exit 0
      "

  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://backlog:backlog@db:5432/backlog?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin}
      API_PORT: ${API_PORT:-8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_EMAIL_CLAIM: ${OIDC_EMAIL_CLAIM:-email}
      OIDC_NAME_CLAIM: ${OIDC_NAME_CLAIM:-name}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-backlog-dev}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_PUBLIC_ENDPOINT: ${STORAGE_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      APP_ORIGINS: ${APP_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 10

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  db_data:
  minio_data:
