services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backlog}
      POSTGRES_USER: ${POSTGRES_USER:-backlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backlog}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backlog} -d ${POSTGRES_DB:-backlog}"]
      interval: 2s
      timeout: 2s
      retries: 20
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://backlog:backlog@db:5432/backlog?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin}
      API_PORT: ${API_PORT:-8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_EMAIL_CLAIM: ${OIDC_EMAIL_CLAIM:-email}
      OIDC_NAME_CLAIM: ${OIDC_NAME_CLAIM:-name}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 10

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  db_data:
